name: Deploy API to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Python 3.12 if not present
            if ! command -v python3.12 &> /dev/null; then
              sudo yum install -y python3.12 python3.12-pip
            fi

            cd /opt/vsportmanager

            # Force pull
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies with Python 3.12
            python3.12 -m pip install --user -r requirements.txt

            # Restart API
            pkill -f "uvicorn app.main:app" || true
            export $(cat .env | xargs)
            nohup python3.12 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 > /var/log/vsportmanager.log 2>&1 &

            echo "Deploy complete"
